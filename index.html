<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PENGHITUNG AMAL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>ALAT PENGHITUNG AMAL</h1>
        
        <h2>IBADAH:</h2>
        <div class="form-group">
            <label><input type="checkbox" value="100" class="ibadah"> Beristigfar</label><br>
            <label><input type="checkbox" value="200" class="ibadah"> Solat sunnah</label><br>
            <label><input type="checkbox" value="300" class="ibadah"> Baca Al-Quran</label><br>
            <label><input type="checkbox" value="400" class="ibadah"> Bersedekah</label><br>
            <label><input type="checkbox" value="500" class="ibadah"> Tidur</label><br>
        </div>

        <h2>MAKSIAT:</h2>
        <div class="form-group">
            <label><input type="checkbox" value="100" class="maksiat"> Berkata kasar</label><br>
            <label><input type="checkbox" value="200" class="maksiat"> Menggunjing</label><br>
            <label><input type="checkbox" value="300" class="maksiat"> Memfitnah</label><br>
            <label><input type="checkbox" value="400" class="maksiat"> Berkelahi</label><br>
            <label><input type="checkbox" value="1000000" class="maksiat"> Qorbu zina</label><br>
        </div>

        <button id="hitung">SURGA ATAU NERAKA</button>
        <h2>Pahala anda: <span id="selisih">0</span></h2>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
